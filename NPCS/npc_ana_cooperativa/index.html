<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fashion Trace - NPC Template</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    height:100vh;
}

.scene{
    width:100%;
    height:100vh;

    background:url("background.jpg") center center/cover no-repeat;

    position:relative;
}

.overlay{
    position:absolute;
    inset:0;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.1),
        rgba(0,0,0,0.6)
    );
}

.character{

    position:absolute;

    right:5%;
    bottom:140px;

    height:80vh;

    display:flex;
    align-items:flex-end;
}

.character img{
    height:100%;
    object-fit:contain;

    filter:drop-shadow(0 0 25px rgba(0,0,0,.5));
}

.dialogue-box{

    position:absolute;

    left:50%;
    transform:translateX(-50%);

    bottom:20px;

    width:90%;
    max-width:1200px;

    background:rgba(10,15,30,.95);

    border:2px solid #43d8ff;

    border-radius:20px;

    padding:20px;

    color:white;

    backdrop-filter:blur(10px);
}

.npc-name{

    color:#43d8ff;

    font-size:1.4rem;

    font-weight:600;

    margin-bottom:10px;
}

.dialogue{

    min-height:80px;

    line-height:1.6;

    margin-bottom:20px;
}

.choices{

    display:grid;
    gap:10px;
}

.choice{

    background:#1d2740;

    border:none;

    color:white;

    padding:14px;

    border-radius:12px;

    cursor:pointer;

    transition:.2s;
}

.choice:hover{

    background:#43d8ff;

    color:black;

    transform:translateY(-2px);
}

.quiz{

    display:none;
}

.quiz h2{
    margin-bottom:20px;
}

.quiz button{

    width:100%;

    margin-bottom:10px;

    padding:15px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:#24324f;

    color:white;
}

.quiz button:hover{
    background:#43d8ff;
    color:black;
}

.unlock{

    display:none;

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#1f5d37;
}

.contacts{

    position:absolute;

    top:20px;

    left:20px;

    background:rgba(0,0,0,.7);

    color:white;

    padding:15px;

    border-radius:12px;

    width:250px;
}

.contacts h3{
    margin-bottom:10px;
}

.locked{
    opacity:.4;
}

</style>
</head>
<body>

<div class="scene">

    <div class="overlay"></div>

    <div class="contacts">

        <h3>Contatos</h3>

        <p>✓ Ana</p>
        <p class="locked">🔒 Carlos</p>
        <p class="locked">🔒 Helena</p>

    </div>

    <div class="character">
        <img src="npc.png" alt="NPC">
    </div>

    <div class="dialogue-box">

        <div class="npc-name">
            ANA SILVA
        </div>

        <div id="dialogue" class="dialogue">

            Olá! Trabalho em uma cooperativa de reciclagem têxtil.
            Muitas roupas chegam aqui sem qualquer rastreabilidade.

        </div>

        <div id="choices" class="choices">

            <button class="choice"
                onclick="showDialogue(1)">
                Como funciona a reciclagem têxtil?
            </button>

            <button class="choice"
                onclick="showDialogue(2)">
                O que é economia circular?
            </button>

            <button class="choice"
                onclick="startQuiz()">
                Fazer Quiz
            </button>

        </div>

        <div id="quiz" class="quiz">

            <h2>Quiz</h2>

            <p>
                Qual é um dos objetivos da economia circular?
            </p>

            <br>

            <button onclick="correctAnswer()">
                Reutilizar materiais
            </button>

            <button onclick="wrongAnswer()">
                Produzir mais resíduos
            </button>

            <button onclick="wrongAnswer()">
                Descartar roupas rapidamente
            </button>

            <button onclick="wrongAnswer()">
                Aumentar desperdício
            </button>

        </div>

        <div id="unlock" class="unlock">

            <strong>Novo Contato Desbloqueado!</strong>

            <p>
                Carlos - Especialista em Logística Reversa
            </p>

        </div>

    </div>

</div>

<script>

function showDialogue(option){

    const dialogue =
    document.getElementById("dialogue");

    if(option === 1){

        dialogue.innerHTML =
        "A reciclagem têxtil transforma roupas descartadas em novas matérias-primas.";

    }

    if(option === 2){

        dialogue.innerHTML =
        "A economia circular busca manter materiais em uso pelo maior tempo possível.";
    }

}

function startQuiz(){

    document
    .getElementById("quiz")
    .style.display = "block";

}

function correctAnswer(){

    alert("Resposta correta!");

    document
    .getElementById("unlock")
    .style.display = "block";

}

function wrongAnswer(){

    alert("Resposta incorreta. Tente novamente.");

}

</script>

</body>
</html>
