    <h1>Carlos Mendes</h1>
    <p><strong>Tema:</strong> Logística Reversa</p>

    <h2>Desafio de Pista</h2>
    <p>O que define um sistema de recolha de roupa pós-consumo verdadeiramente eficaz?</p>

    <button onclick="answerQuiz(true, 'carlos', ['felipe'])">

    </button>
    
    <button onclick="answerQuiz(false, 'carlos')">
        B) Incinerar as roupas antigas para gerar energia rápida para novas coleções.
    </button>
