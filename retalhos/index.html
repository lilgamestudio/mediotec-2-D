<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Fashion Trace</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<h1>Fashion Trace</h1>

<button onclick="resetProgress()">
Resetar Progresso
</button>

<div id="npcList"></div>

<script src="js/game.js"></script>

<script>

fetch("data/npcs.json")
.then(r => r.json())
.then(npcs => {

    const container =
    document.getElementById("npcList");

    for(const id in npcs){

        const div =
        document.createElement("div");

        if(
            id === "ana" ||
            isUnlocked(id)
        ){

            div.innerHTML =
            `<a href="npcs/${id}.html">
                ${npcs[id].name}
             </a>`;

        }else{

            div.innerHTML =
            `🔒 ${npcs[id].name}`;

        }

        container.appendChild(div);

    }

});

</script>

</body>
</html>
