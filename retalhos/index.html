<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Fashion Trace - Painel de Investigação</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos para o Sistema de Abas */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #222;
            color: #aaa;
            border: 2px solid #333;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #43d8ff;
            color: #111;
            border-color: #43d8ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        /* Centralização do Canvas do Jogo */
        #canvas-wrapper {
            text-align: center;
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #222;
            position: relative;
        }
        canvas {
            border: 3px solid #333;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }
        .controls-hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        /* Indicador do Carrossel de Mundos */
        .world-carousel-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .world-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #43d8ff;
            min-width: 250px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .key-badge {
            background: #333;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Fashion Trace</h1>
    
    <div style="margin-bottom: 20px;">
        <button onclick="resetProgress()">Reset Progress</button>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('map-view')">🗺️ Mapa Topdown</button>
        <button class="tab-btn" onclick="switchTab('list-view')">📋 Lista de Alvos</button>
    </div>

    <div id="map-view" class="tab-content active">
        <div id="canvas-wrapper">
            <div class="world-carousel-indicator">
                <span class="key-badge">Q</span>
                <div id="current-world-title" class="world-name">Distrito de Alta Costura</div>
                <span class="key-badge">E</span>
            </div>

            <canvas id="worldMap" width="800" height="450"></canvas>
            <p class="controls-hint">
                Movimento: <b>▲ ▼ ◀ ▶</b> ou <b>W, A, S, D</b>. | 
                Alternar entre Mundos: <b style="color: #43d8ff;">Q</b> e <b style="color: #43d8ff;">E</b> (Carrossel).
            </p>
        </div>
    </div>

    <div id="list-view" class="tab-content">
        <div id="npcList"></div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/npc-loader.js"></script>
    <script src="js/world-map.js"></script>

    <script>
        // Inicializa o menu de alvos na aba secundária
        if (typeof renderNPCMenu === 'function') {
            renderNPCMenu("npcList");
        } else if (typeof renderContacts === 'function') {
            // Caso o teu script use o nome "renderContacts"
            renderContacts("npcList");
        }

        // Gestão nativa da troca de Abas
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            
            // Define o botão clicado como ativo
            if (event && event.target) {
                event.target.classList.add('active');
            }

            // Garante que o mapa inicia se voltarmos para a aba dele
            if (tabId === 'map-view' && typeof initWorldMap === 'function') {
                initWorldMap();
            }
        }

        // Inicia o mapa assim que a página carregar
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initWorldMap === 'function') {
                initWorldMap();
            }
        });
    </script>
</body>
</html>
